<!doctype html>
<html>
    <head>
        <style>
            @font-face {{
                font-family: 'Monaspace Xenon';
                font-style: normal;
                font-display: swap;
                font-weight: 400;
                src: url(https://cdn.jsdelivr.net/fontsource/fonts/monaspace-xenon@latest/latin-400-normal.woff2) format('woff2'),
                     url(https://cdn.jsdelivr.net/fontsource/fonts/monaspace-xenon@latest/latin-400-normal.woff) format('woff');
            }}

            html, body {{
                    margin: 0;
                    padding: 0;
                    height: 100vh;
                    width: 100vw;
                    overflow: hidden;
                    box-sizing: border-box;
            }}

            body {{
                display: flex;
                flex-direction: column;
                font-family: 'Monaspace Xenon', serif;
                padding: 20px;
            }}

            pre {{
                font-family: 'Monaspace Xenon', monospace;
                size: 16pt;
            }}

            #log-container {{
                flex-grow: 1;
                overflow-x: auto;
                overflow-y: auto;
                margin-bottom: 15px;
                padding: 10px;
            }}
        </style>
    </head>
    <body>
        <h1>Build Dashboard</h1>
        <h2>Id: {id}</h2>
        <div id="log-container">{log_divs}</div>
        <button id="load-build-button">Return to homepage...</button>
        <script>
            // prettier-ignore
            {bundle_js}
        </script>
    </body>
</html>
